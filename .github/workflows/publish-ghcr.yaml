name: Docker base image

on: 
  push

permissions:
  packages: write

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GH_PATH }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build
        run: docker build . -t ghcr.io/${{ github.repository_owner }}/base-image:latest

      - name: Push
        run: docker push ghcr.io/${{ github.repository_owner }}/base-image:latest
