name: Docker base image

on:
  push:

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    env:
      USERNAME: ${{ github.actor }}
      PROJECT: base-image

    steps:
      - uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build . --tag ghcr.io/${{ github.actor }}/base-image:latest

      - name: Push image
        run: docker push ghcr.io/${{ github.actor }}/base-image:latest



