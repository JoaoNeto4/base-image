name: Build and Push Docker Image

on:
  push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PATH }}

      - name: Build image
        run: docker build . -t ghcr.io/${{  github.actor }}/base-image:latest

      - name: Push image
        run: docker push ghcr.io/${{  github.actor }}/base-image:latest
